services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: manage-cost-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter server build
    startCommand: node server/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: https://gastos.santiagomustafa.com.ar
      # Configurar manualmente en el dashboard de Render:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_AUTH_TOKEN
        sync: false
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 30d

  # ── Frontend SPA ───────────────────────────────────────────────────────────
  - type: web
    name: manage-cost-web
    runtime: static
    region: oregon
    plan: free
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter web build
    staticPublishPath: apps/web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # Proxy /api al backend
      - type: rewrite
        source: /api/*
        destination: https://api.santiagomustafa.com.ar/api/:splat
      # SPA fallback: todas las rutas al index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://api.santiagomustafa.com.ar
